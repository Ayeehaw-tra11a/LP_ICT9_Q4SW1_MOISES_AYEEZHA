<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SEATWORK 1</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #b5b7bc, #c6d2e0);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


.container {
    display: flex;
    align-items: center;
    gap: 60px;
}


.login-box {
    background: rgb(249, 243, 243);
    padding: 30px;
    border-radius: 15px;
    width: 280px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}


.login-box input[type="text"],
.login-box input[type="password"] {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #9b9898;
}


.login-box input[type="submit"] {
    width: 100%;
    padding: 10px;
    background: #74f7cf;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
}

.login-box button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: rgb(228, 222, 222);
    cursor: pointer;
}


.forgot {
    display: block;
    margin-top: 10px;
    font-size: 12px;
    color: #27cca0;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="container">
 

    <div class="login-box">

        <form onsubmit="authenticate(); return false;">
            
            <label>Username:</label>
            <input type="text" id="uname" placeholder="enter username" required>

            <label>Password:</label>
            <input type="password" id="pword" placeholder="enter password" required>

            <input type="submit" value="Login">

            <button type="button">Cancel</button>

            <a href="#" class="forgot">Forgot username / password?</a>

        </form>

    </div>

</div>

<script>
function authenticate(){

    var sapphire1 = document.getElementById("uname").value;
    var sapphire2 = document.getElementById("pword").value;

    if(sapphire1 === "Tungtung" && sapphire2 === "Sahur3"){
        alert("Welcome " + sapphire1 + "!");
    } else {
        alert("Incorrect username/password.");
    }

}
</script>

</body>
</html>
